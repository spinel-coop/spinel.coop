baseURL = 'https://spinel.coop'
locale = 'en-us'
title = 'Spinel, the Ruby open source maintainers‘ co-op'
summaryLength = 20

[outputs]
home = ['html', 'rss', 'schedule']
section = ['html', 'rss']

[services.rss]
limit = 50

# allow html inside markdown files
[markup.goldmark]
renderer.unsafe = true

# remove tags and categories
disableKinds = ["taxonomy", "term"]
[taxonomies]

# CloudCannon scheduling via _schedule.txt listing future-dated posts.
[mediaTypes."text/x-cloudcannon-schedule"]
suffixes = ['txt']
[outputFormats.schedule]
mediaType = 'text/x-cloudcannon-schedule'
baseName = '_schedule'
isPlainText = true
notAlternative = true
