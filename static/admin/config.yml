publish_mode: editorial_workflow
backend:
  name: github
  repo: spinel-coop/spinel.coop
  branch: main
  use_graphql: true
display_url: https://spinel.coop
logo:
  src: https://spinel.coop/img/gems.svg
  show_in_header: true
editor:
  preview: false
media_folder: static/img
public_folder: /img
collections:
  - label: "Pages"
    name: "pages"
    label_singular: "Page"
    files:
      - label: "spinel.coop homepage"
        name: "home"
        file: "content/_index.md"
        preview_path: "/"
        extension: md
        format: toml-frontmatter
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Publish Date", name: "date", widget: "datetime" }
          - { label: "URL Slug", name: "slug", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Rails Performance from Spinel"
        name: "performance"
        file: "content/performance.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Publish Date", name: "date", widget: "datetime" }
          - { label: "URL Slug", name: "slug", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Retainer Prospectus"
        name: "prospectus"
        file: "content/prospectus.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Publish Date", name: "date", widget: "datetime" }
          - { label: "URL Slug", name: "slug", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{title}}"
    extension: md
    format: toml-frontmatter
    media_folder: "content/blog/{{year}}-{{month}}-{{day}}-{{slug}}"
    public_folder: "blog/{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "URL Slug", name: "slug", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
