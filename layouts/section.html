{{ define "main" }}
  {{ partial "nav.html" }}
  {{ .Content }}
  {{ range .Pages }}
    <h2>{{ .LinkTitle | safeHTML }}</h2>
    <div>{{ .Summary }}</div>
    {{- if .Truncated }}
    <div style="text-align: right;">
      <a href="{{ .RelPermalink }}">Keep reading &rarr;</a>
    </div>
    {{- end }}
  {{ end }}
{{ end }}
